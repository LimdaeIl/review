server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: review-app

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:review}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER:review}
    password: ${MYSQL_PASSWORD:review}
    driver-class-name: com.mysql.cj.jdbc.Driver


    hikari:
      pool-name: ReviewHikariPool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-millis: ${JWT_ACCESS_TOKEN_EXPIRE_MILLIS}
  refresh-token-expiration-millis: ${JWT_REFRESH_TOKEN_EXPIRE_MILLIS}