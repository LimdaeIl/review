server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: review-app

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import: optional:file:./.env[.properties]

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


    hikari:
      pool-name: ReviewHikariPool
      maximum-pool-size: ${DB_MAX_POOL_SIZE}
      minimum-idle: ${DB_MIN_IDLE}
      connection-timeout: ${DB_CONNECTION_TIMEOUT}
      validation-timeout: ${DB_VALIDATION_TIMEOUT}
      idle-timeout: ${DB_IDLE_TIMEOUT}
      max-lifetime: ${DB_MAX_LIFETIME}

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      repositories:
        enabled: false

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-millis: ${JWT_ACCESS_TOKEN_EXPIRE_MILLIS}
  refresh-token-expiration-millis: ${JWT_REFRESH_TOKEN_EXPIRE_MILLIS}